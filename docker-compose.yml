version: '3'
services:
  mainapp:
    build: .
    container_name: mainapp
    hostname: mainapp
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/MainApp/:/var/www/html/
    image: arcadia_mainapp
    networks:
    - internal
  backend:
    build: .
    container_name: backend
    hostname: backend
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/files/:/var/www/html/files/
    image: arcadia_backend
    networks:
    - internal
  app2:
    build: .
    container_name: app2
    hostname: app3
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/api/:/var/www/html/api/
    image: arcadia_app2
    networks:
    - internal
  app3:
    build: .
    container_name: app3
    hostname: app3
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/app3/:/var/www/html/app3/
    image: arcadia_app3
    networks:
    - internal

  arcadia-llm:
    build: ./arcadia-llm
    container_name: arcadia-llm
    hostname: arcadia-llm
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_URL=${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - VECTOR_TOP_K=${VECTOR_TOP_K:-4}
    volumes:
      - ./arcadia-llm/docs:/app/docs
      - ./arcadia-llm/chromadb:/app/chromadb
    networks:
      - internal

  chatbot:
    build: ./chatbot
    container_name: chatbot
    hostname: chatbot
    environment:
      - LLM_URL=http://arcadia-llm:8001/chat
    depends_on:
      - arcadia-llm
    networks:
      - internal

networks:
  internal: