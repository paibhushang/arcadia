version: '3'
services:
  mainapp:
    build: .
    container_name: mainapp
    hostname: mainapp
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/MainApp/:/var/www/html/
    image: arcadia_mainapp
    networks:
    - internal
  backend:
    build: .
    container_name: backend
    hostname: backend
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/files/:/var/www/html/files/
    image: arcadia_backend
    networks:
    - internal
  app2:
    build: .
    container_name: app2
    hostname: app3
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/api/:/var/www/html/api/
    image: arcadia_app2
    networks:
    - internal
  app3:
    build: .
    container_name: app3
    hostname: app3
    volumes:
    - /Users/dierick/F5_Networks/GitHub/arcadia-finance/app3/:/var/www/html/app3/
    image: arcadia_app3
    networks:
    - internal

  gemma4:
    image: ai/gemma4
    container_name: gemma4
    hostname: gemma4
    networks:
      - internal
    # Uncomment to enable GPU access:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  chatbot:
    build: ./main/chatbot
    container_name: chatbot
    hostname: chatbot
    environment:
      - GEMMA_URL=http://gemma4:8080/v1/chat/completions
    depends_on:
      - gemma4
    networks:
      - internal

networks:
  internal: